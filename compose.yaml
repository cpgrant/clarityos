services:
  api:
    build:
      context: .
      dockerfile: Containerfile
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./approvals:/app/approvals
      - ./artifacts:/app/artifacts
      - ./jobs:/app/jobs
      - ./logs:/app/logs
      - ./memories:/app/memories
      - ./sessions:/app/sessions
      - ./workers:/app/workers
      - ./workflows:/app/workflows

  worker:
    build:
      context: .
      dockerfile: Containerfile
    command: python -m runtime.worker_loop --name packaged-worker --poll-seconds 2
    depends_on:
      - api
    env_file:
      - .env
    volumes:
      - ./approvals:/app/approvals
      - ./artifacts:/app/artifacts
      - ./jobs:/app/jobs
      - ./logs:/app/logs
      - ./memories:/app/memories
      - ./sessions:/app/sessions
      - ./workers:/app/workers
      - ./workflows:/app/workflows
