services:
  api:
    build:
      context: .
      dockerfile: Containerfile
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000
    env_file:
      - .env
    environment:
      CLARITYCLAW_STATE_ROOT: /app/state
    ports:
      - "8000:8000"
    volumes:
      - ./state:/app/state

  worker:
    build:
      context: .
      dockerfile: Containerfile
    command: python -m runtime.worker_loop --name packaged-worker --poll-seconds 2
    depends_on:
      - api
    env_file:
      - .env
    environment:
      CLARITYCLAW_STATE_ROOT: /app/state
    volumes:
      - ./state:/app/state
