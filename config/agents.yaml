agents:
  default:
    system: "You are a helpful assistant"
    model: fast
    policy: safe_readonly
    budgets:
      max_steps: 4
      max_tool_calls: 2
      max_tokens: 4000
      max_wall_clock_ms: 30000
    subruns:
      max_children: 3
      max_depth: 2
      allowed_agents:
        - researcher
      allowed_capabilities:
        - model_call
        - file_read
        - exec
      allowed_tools:
        - read_file
        - list_files
        - list_directory
        - read_file_range
        - search_files
        - inspect_session
        - inspect_workflow
        - inspect_queue
        - inspect_worker
        - echo
        - get_time
    tools:
      - echo
      - get_time
      - read_file
      - list_files
      - list_directory
      - read_file_range
      - search_files
      - inspect_session
      - inspect_workflow
      - inspect_queue
      - inspect_worker

  researcher:
    system: "You provide precise, structured answers. Prefer grounded, concise responses. When project context is supplied, use it directly, avoid generic software advice, and make the structure easy to scan."
    model: smart
    policy: safe_research_http
    budgets:
      max_steps: 4
      max_tool_calls: 2
      max_tokens: 4000
      max_wall_clock_ms: 30000
    tools:
      - get_time
      - read_file
      - list_files
      - list_directory
      - read_file_range
      - search_files
      - fetch_url
      - inspect_session
      - inspect_workflow
      - inspect_queue
      - inspect_worker

  memory_operator:
    system: "You manage explicit memory records and retrieval results"
    model: fast
    policy: memory_basic
    budgets:
      max_steps: 4
      max_tool_calls: 2
      max_tokens: 4000
      max_wall_clock_ms: 30000
    tools:
      - memory_write
      - memory_query

  maintenance_operator:
    system: "You run narrow, operator-safe maintenance actions with explicit runtime visibility."
    model: fast
    policy: runtime_maintenance
    budgets:
      max_steps: 4
      max_tool_calls: 3
      max_tokens: 4000
      max_wall_clock_ms: 30000
    tools:
      - inspect_session
      - inspect_workflow
      - inspect_queue
      - inspect_worker
      - archive_session
      - prune_sessions
      - promote_ready_jobs
      - repair_stale_jobs
      - repair_orphaned_workers
      - safe_resume_workflow
      - replay_workflow
      - recover_workflow

  local:
    system: "You are a helpful assistant"
    model: local_fast
    policy: safe_readonly
    budgets:
      max_steps: 4
      max_tool_calls: 2
      max_tokens: 4000
      max_wall_clock_ms: 30000

  local_gemma:
    system: "You are a helpful assistant"
    model: local_gemma
    policy: safe_readonly
    budgets:
      max_steps: 4
      max_tool_calls: 2
      max_tokens: 4000
      max_wall_clock_ms: 30000

  supervised:
    system: "You are a supervised assistant that requires approval before running echo"
    model: fast
    policy: approval_exec
    budgets:
      max_steps: 4
      max_tool_calls: 2
      max_tokens: 4000
      max_wall_clock_ms: 30000
    tools:
      - echo
