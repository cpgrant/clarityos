policies:
  safe_readonly:
    allow:
      - capability: model_call
      - capability: exec
        commands:
          - echo
          - get_time
      - capability: file_read
        paths:
          - "**"
      - capability: runtime_read
    deny:
      - capability: file_write
      - capability: http
      - capability: runtime_write
      - capability: memory_read
      - capability: memory_write

  safe_research_http:
    allow:
      - capability: model_call
      - capability: exec
        commands:
          - get_time
      - capability: file_read
        paths:
          - "**"
      - capability: runtime_read
      - capability: http
        domains:
          - docs.openclaw.ai
          - platform.openai.com
          - docs.crewai.com
    deny:
      - capability: file_write
      - capability: runtime_write
      - capability: memory_read
      - capability: memory_write

  approval_exec:
    allow:
      - capability: model_call
      - capability: file_read
        paths:
          - "**"
      - capability: runtime_read
    approval:
      - capability: exec
        commands:
          - echo
    deny:
      - capability: file_write
      - capability: http
      - capability: runtime_write
      - capability: memory_read
      - capability: memory_write

  memory_basic:
    allow:
      - capability: model_call
      - capability: memory_read
        scope_kinds:
          - global
          - agent
          - workflow
          - run
      - capability: memory_write
        memory_types:
          - fact
          - summary
          - observation
          - artifact_ref
        scope_kinds:
          - agent
          - workflow
          - run
    deny:
      - capability: file_write
      - capability: http
      - capability: runtime_write

  runtime_maintenance:
    allow:
      - capability: runtime_read
      - capability: runtime_write
        commands:
          - archive_session
          - prune_sessions
          - promote_ready_jobs
          - repair_stale_jobs
          - repair_orphaned_workers
          - safe_resume_workflow
          - replay_workflow
          - recover_workflow
    deny:
      - capability: file_write
      - capability: http
      - capability: memory_read
      - capability: memory_write
