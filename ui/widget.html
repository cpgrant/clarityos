<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ClarityClaw Widget</title>
  <style>
    :root {
      --bg: #f6f1e9;
      --panel: rgba(255, 250, 244, 0.94);
      --ink: #1f1a15;
      --muted: #665b4d;
      --accent: #176b52;
      --accent-soft: #dbefe8;
      --user: #efe0cc;
      --assistant: #dcefe7;
      --border: #dfd2c0;
      --error: #8b2731;
      --shadow: 0 18px 40px rgba(31, 26, 21, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Georgia, "Times New Roman", serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top right, rgba(23, 107, 82, 0.1), transparent 32%),
        linear-gradient(180deg, #f9f4ec 0%, var(--bg) 100%);
      user-select: text;
      -webkit-user-select: text;
    }

    .shell {
      height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr auto;
      background: var(--panel);
      border: 1px solid rgba(223, 210, 192, 0.85);
      box-shadow: var(--shadow);
    }

    .header {
      padding: 14px 16px 12px;
      border-bottom: 1px solid rgba(223, 210, 192, 0.8);
      display: flex;
      justify-content: space-between;
      align-items: start;
      gap: 12px;
    }

    .eyebrow {
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 6px;
    }

    h1 {
      margin: 0 0 4px;
      font-size: 24px;
      line-height: 1;
      font-weight: 600;
    }

    .subhead {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.45;
      max-width: 320px;
    }

    .meta {
      text-align: right;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
    }

    .messages {
      padding: 14px;
      overflow: auto;
      display: grid;
      gap: 10px;
      align-content: start;
    }

    .message {
      max-width: 92%;
      border-radius: 18px;
      padding: 12px 14px;
      line-height: 1.45;
      border: 1px solid rgba(31, 26, 21, 0.06);
      box-shadow: 0 6px 16px rgba(31, 26, 21, 0.03);
    }

    .message.user {
      background: var(--user);
      justify-self: end;
    }

    .message.assistant {
      background: var(--assistant);
    }

    .message.system {
      background: #f3ece1;
      color: var(--muted);
      max-width: 100%;
    }

    .role {
      display: block;
      margin-bottom: 6px;
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .composer {
      padding: 12px 14px 14px;
      border-top: 1px solid rgba(223, 210, 192, 0.8);
      display: grid;
      gap: 10px;
    }

    textarea,
    button {
      font: inherit;
    }

    textarea {
      width: 100%;
      min-height: 96px;
      max-height: 180px;
      resize: vertical;
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 12px 14px;
      background: #fffdf8;
      color: var(--ink);
    }

    .actions {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    .button-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    button {
      border: 0;
      border-radius: 999px;
      padding: 11px 16px;
      cursor: pointer;
      transition: transform 120ms ease;
      user-select: none;
      -webkit-user-select: none;
    }

    button:hover {
      transform: translateY(-1px);
    }

    .primary {
      background: var(--accent);
      color: white;
    }

    .secondary {
      background: #eadfce;
      color: var(--ink);
    }

    .status {
      font-size: 13px;
      color: var(--muted);
    }

    .status.error {
      color: var(--error);
    }

    .note {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.45;
    }

    .empty {
      color: var(--muted);
      font-style: italic;
      padding: 8px 2px;
    }
  </style>
</head>
<body>
  <div class="shell">
    <header class="header">
      <div>
        <div class="eyebrow">ClarityClaw Embed</div>
        <h1 id="widget-title">Assistant</h1>
        <p class="subhead" id="widget-subhead">A thin web gateway over the existing session runtime.</p>
      </div>
      <div class="meta">
        <div><strong>Status</strong></div>
        <div id="session-status">idle</div>
        <div id="session-agent">researcher</div>
      </div>
    </header>

    <main id="messages" class="messages">
      <div class="empty">Send a message to start a session-backed assistant thread.</div>
    </main>

    <form id="composer" class="composer">
      <textarea id="message-input" placeholder="Ask something durable. The widget still goes through sessions, workflows, and recovery-aware runtime logic."></textarea>
      <div class="actions">
        <div id="status-line" class="status">Ready.</div>
        <div class="button-row">
          <button type="button" class="secondary" id="new-thread">New Thread</button>
          <button type="submit" class="primary" id="send-button">Send</button>
        </div>
      </div>
      <div id="widget-note" class="note">Widget access stays scoped to this browser session and the configured host policy.</div>
    </form>
  </div>

  <script>
    const runtimeConfig = window.__CLARITYCLAW_WIDGET_CONFIG__ || window.__CLARITYOS_WIDGET_CONFIG__ || {};
    const branding = runtimeConfig.branding || {};
    const allowedAgents = Array.isArray(runtimeConfig.allowed_agents) ? runtimeConfig.allowed_agents : [];
    const params = new URLSearchParams(window.location.search);
    const widgetTitle = params.get("title") || branding.name || "ClarityClaw Assistant";
    function resolveAgent(candidate) {
      if (!allowedAgents.length) {
        return candidate || branding.default_agent || "researcher";
      }
      if (candidate && allowedAgents.includes(candidate)) {
        return candidate;
      }
      if (branding.default_agent && allowedAgents.includes(branding.default_agent)) {
        return branding.default_agent;
      }
      return allowedAgents[0];
    }
    const widgetAgent = resolveAgent(params.get("agent") || branding.default_agent || "researcher");
    const widgetSubtitle = params.get("subtitle") || branding.tagline || "A thin web gateway over the existing session runtime.";
    const widgetChannel = params.get("channel") || "embed_widget";
    const widgetAccent = params.get("accent") || branding.accent || "#176b52";
    const parentOrigin = params.get("parent_origin");
    const storageKey = `clarityclaw-widget-session:${widgetAgent}:${widgetTitle}`;
    const legacyStorageKey = `clarityos-widget-session:${widgetAgent}:${widgetTitle}`;
    const sessionAuthHeader = "X-Session-Token";
    const pollIntervalMs = 2500;

    const titleEl = document.getElementById("widget-title");
    const subheadEl = document.getElementById("widget-subhead");
    const statusEl = document.getElementById("session-status");
    const agentEl = document.getElementById("session-agent");
    const messagesEl = document.getElementById("messages");
    const composerEl = document.getElementById("composer");
    const inputEl = document.getElementById("message-input");
    const statusLineEl = document.getElementById("status-line");
    const sendButtonEl = document.getElementById("send-button");
    const newThreadEl = document.getElementById("new-thread");
    const widgetNoteEl = document.getElementById("widget-note");

    function readStoredSession() {
      const raw = window.localStorage.getItem(storageKey) || window.localStorage.getItem(legacyStorageKey);
      if (!raw) {
        return { sessionId: null, sessionToken: null };
      }
      try {
        const parsed = JSON.parse(raw);
        return {
          sessionId: typeof parsed.session_id === "string" ? parsed.session_id : null,
          sessionToken: typeof parsed.session_token === "string" ? parsed.session_token : null,
        };
      } catch (_error) {
        return { sessionId: raw, sessionToken: null };
      }
    }

    function persistSessionCredentials(nextSessionId, nextSessionToken) {
      if (!nextSessionId) {
        window.localStorage.removeItem(storageKey);
        window.localStorage.removeItem(legacyStorageKey);
        return;
      }
      window.localStorage.setItem(storageKey, JSON.stringify({
        session_id: nextSessionId,
        session_token: nextSessionToken || null,
      }));
      window.localStorage.removeItem(legacyStorageKey);
    }

    let { sessionId, sessionToken } = readStoredSession();
    let pollTimer = null;

    document.documentElement.style.setProperty("--accent", widgetAccent);
    titleEl.textContent = widgetTitle;
    subheadEl.textContent = widgetSubtitle;
    agentEl.textContent = widgetAgent;

    function originAllowed(requestedOrigin) {
      const allowedOrigins = Array.isArray(runtimeConfig.allowed_origins) ? runtimeConfig.allowed_origins : [];
      const serviceOrigin = runtimeConfig.service_origin || window.location.origin;
      if (!requestedOrigin) {
        return true;
      }
      if (allowedOrigins.includes("*")) {
        return true;
      }
      if (allowedOrigins.length === 0) {
        return requestedOrigin === serviceOrigin;
      }
      return allowedOrigins.includes(requestedOrigin);
    }

    function setStatus(message, isError = false) {
      statusLineEl.textContent = message;
      statusLineEl.classList.toggle("error", isError);
    }

    function setBusy(isBusy) {
      sendButtonEl.disabled = isBusy;
      newThreadEl.disabled = isBusy;
      inputEl.disabled = isBusy;
    }

    function messageEmptyState() {
      return sessionId
        ? "This embed thread is ready for the next message."
        : "Send a message to start a session-backed assistant thread.";
    }

    function renderMessages(messages) {
      messagesEl.innerHTML = "";
      if (!Array.isArray(messages) || messages.length === 0) {
        messagesEl.innerHTML = `<div class="empty">${messageEmptyState()}</div>`;
        return;
      }

      for (const message of messages) {
        const article = document.createElement("article");
        article.className = `message ${message.role || "system"}`;

        const role = document.createElement("span");
        role.className = "role";
        role.textContent = `${message.role || "system"}${message.status ? " • " + message.status : ""}`;
        article.appendChild(role);

        const body = document.createElement("div");
        body.textContent = message.content || "(no output yet)";
        article.appendChild(body);

        messagesEl.appendChild(article);
      }

      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function updateSession(session) {
      statusEl.textContent = session.status || "unknown";
      agentEl.textContent = session.agent || widgetAgent;
      if (session.status === "waiting") {
        widgetNoteEl.textContent = "This widget thread is waiting on workflow progress, approval, or retry handling.";
      } else if (session.status === "recovered") {
        widgetNoteEl.textContent = "This widget thread has recovered from an earlier waiting or errored state.";
      } else if (session.status === "errored") {
        widgetNoteEl.textContent = "The last widget request errored. You can start a new thread or retry.";
      } else {
        widgetNoteEl.textContent = "Widget access stays scoped to this browser session and the configured host policy.";
      }
      renderMessages(session.messages || []);
    }

    async function fetchJson(url, options = {}) {
      const headers = {
        "Content-Type": "application/json",
        ...(options.headers || {}),
      };
      if (sessionToken && (url.startsWith("/assistant/sessions/") || url.startsWith("/sessions/"))) {
        headers[sessionAuthHeader] = sessionToken;
      }
      const response = await fetch(url, {
        headers,
        ...options,
      });
      const payload = await response.json();
      if (!response.ok || payload.status === "error") {
        throw new Error(payload?.error?.message || `Request failed with status ${response.status}`);
      }
      return payload;
    }

    async function createSession() {
      const payload = await fetchJson("/sessions", {
        method: "POST",
        body: JSON.stringify({
          title: widgetTitle,
          agent: widgetAgent,
          surface: "embed_widget",
          metadata: {
            channel: widgetChannel,
            source: "widget",
          },
        }),
      });
      sessionId = payload.session_id;
      sessionToken = payload.session_token || null;
      persistSessionCredentials(sessionId, sessionToken);
      updateSession({ ...payload, messages: [] });
      setStatus("Thread created for this browser.");
      return payload;
    }

    async function loadSession() {
      if (!sessionId) {
        return null;
      }
      const session = await fetchJson(`/assistant/sessions/${sessionId}`);
      updateSession(session);
      if (session.status === "waiting") {
        setStatus("Waiting for workflow progress...");
      } else {
        setStatus("Session refreshed.");
      }
      return session;
    }

    function startPolling() {
      stopPolling();
      pollTimer = window.setInterval(async () => {
        if (!sessionId) {
          return;
        }
        try {
          const session = await loadSession();
          if (!session || !["waiting", "active", "recovered"].includes(session.status)) {
            stopPolling();
          }
        } catch (error) {
          setStatus(error.message, true);
          stopPolling();
        }
      }, pollIntervalMs);
    }

    function stopPolling() {
      if (pollTimer !== null) {
        window.clearInterval(pollTimer);
        pollTimer = null;
      }
    }

    async function ensureSession() {
      if (!sessionId) {
        await createSession();
        return;
      }
      await loadSession();
    }

    composerEl.addEventListener("submit", async (event) => {
      event.preventDefault();
      const input = inputEl.value.trim();
      if (!input) {
        setStatus("Write a message first.", true);
        return;
      }

      setBusy(true);
      setStatus("Sending...");
      try {
        await ensureSession();
        const response = await fetchJson(`/sessions/${sessionId}/messages`, {
          method: "POST",
          body: JSON.stringify({
            input,
            agent: widgetAgent,
            metadata: {
              channel: widgetChannel,
              source: "widget",
            },
          }),
        });
        updateSession(response.session);
        inputEl.value = "";
        const resultStatus = response.workflow_result?.status;
        if (resultStatus === "pending" || resultStatus === "retry_wait") {
          setStatus(`Workflow is ${resultStatus}. Polling...`);
        } else {
          setStatus("Message processed.");
        }
        startPolling();
      } catch (error) {
        setStatus(error.message, true);
      } finally {
        setBusy(false);
      }
    });

    newThreadEl.addEventListener("click", async () => {
      stopPolling();
      sessionId = null;
      sessionToken = null;
      persistSessionCredentials(null, null);
      renderMessages([]);
      statusEl.textContent = "idle";
      widgetNoteEl.textContent = "A fresh owned widget thread is being created for this browser.";
      setStatus("Starting a fresh thread.");
      try {
        await createSession();
      } catch (error) {
        setStatus(error.message, true);
      }
    });

    window.addEventListener("load", async () => {
      try {
        if (!originAllowed(parentOrigin)) {
          composerEl.querySelector("textarea").disabled = true;
          composerEl.querySelector("#send-button").disabled = true;
          newThreadEl.disabled = true;
          widgetNoteEl.textContent = "This host is outside the widget allowlist for this deployment.";
          setStatus("This host is not allowed to embed the widget.", true);
          return;
        }
        if (sessionId) {
          await loadSession();
          startPolling();
        } else {
          setStatus("Ready for a first message.");
          widgetNoteEl.textContent = "This widget will create an owned session in the current browser when you send a message.";
        }
      } catch (error) {
        setStatus(error.message, true);
      }
    });
  </script>
</body>
</html>
